<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Как работает Vue</title>
  <link rel="stylesheet" href="theme.css" />
</head>

<body>
  <style>
    [v-cloak] {
      opacity: 0;
    }
  </style>
  <div v-cloak class="container pt-5" id="app">
    <div class="card center">

      <fieldset>
        <input type="text" 
        @keyup.enter="addElementToList" ref="myInput"
        placeholder="Type something" />
      </fieldset>
      <!-- v-model="inputField" -->

      <ul v-if="items.length > 0">
        <li v-for="(item, i) in items" @click="items.splice(i, 1)" :key="item">
          Item: <strong>{{item}}</strong> &nbsp;

          <input @click.stop type="text">

        </li>
      </ul>

      <p v-else>There is not items more...</p>


    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="app.js"></script>
</body>

</html>
